<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
  <h1>Каталог всех тортов</h1>
  <div>
    Категории:
    {% for category in categories %}
    <a href="{% url 'cakes_by_category' category.slug %}">{{ category.name }} </a>
    {% endfor %}
  </div>
  <div>
    Торты:
    {% for cake in cakes %}
    <a href="{% url 'cake_detail' cake.slug %}">{{ cake.name }}</a>
    {% endfor %}
  </div>
</body>
</html>
