<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaufCake</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <img src="images/logo.png" alt="logo">
                RaufCake
            </div>
            <nav class="nav">
                <a href="index.html">Главная</a>
                <a href="catalog.html">Каталог</a>
                <a href="cart.html">Корзина</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-content">
            <h2>Лучшие торты на заказ</h2>
            <p>Свежие и вкусные торты для любого праздника</p>
            <a href="catalog.html" class="btn">Смотреть каталог</a>
        </div>
    </section>

    <!-- Cakes Section -->
    <section class="cakes container">
        <div class="cake-card">
            <img src="images/Chocolate-cake.jpg" alt="Шоколадный торт">
            <h3>Шоколадный торт</h3>
            <p class="price">12000 ₸</p>
            <button class="btn">В корзину</button>
        </div>

        <div class="cake-card">
            <img src="images/Strawberry-cake.jpg" alt="Клубничный торт">
            <h3>Клубничный торт</h3>
            <p class="price">13500 ₸</p>
            <button class="btn">В корзину</button>
        </div>

        <div class="cake-card">
            <img src="images/Vanilla-cake.jpg" alt="Ванильный торт">
            <h3>Ванильный торт</h3>
            <p class="price">12500 ₸</p>
            <button class="btn">В корзину</button>
        </div>

        <div class="cake-card">
            <img src="images/Fruit-cake.jpg" alt="Фруктовый торт">
            <h3>Фруктовый торт</h3>
            <p class="price">14000 ₸</p>
            <button class="btn">В корзину</button>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 RaufCake. Все права защищены.</p>
        </div>
    </footer>

</body>

</html>
