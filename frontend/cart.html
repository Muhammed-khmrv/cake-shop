<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина | RaufCake</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="header">
    <div class="container header-container">
      <div class="logo">
        <img src="images/logo.png" alt="logo">
        RaufCake
      </div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="cart.html">Корзина</a>
        <a href="contacts.html">Контакты</a>
        <a href="./team.html">Наша команда</a>
      </nav>
      <div class="auth-buttons">
        <a class="login" href="login.html">Login</a>
        <a class="register" href="register.html">Register</a>
      </div>
    </div>
  </header>

  <main>
    <section class="cart container">
      <h2>Ваша корзина</h2>
      <div class="cart-items">
        <div class="cart-item">
          <div class="cart-item-card">
            <p> <strong>Шоколадный торт</strong></p>
          </div>
          <div>
            <button class="btn-minus">-</button> <span>1 шт</span> <button class="btn-plus">+</button>
          </div>
          <div>
            <p style="color: white;"><strong>12000 ₸</strong></p> 
          </div>
          <button class="btn-delete">Удалить</button>
        </div>
        <div class="cart-item">
          <p style="color: white;"><strong>Клубничный торт</strong></p>
          <div> <button class="btn-minus">-</button> <span>2 шт</span> <button class="btn-plus">+</button> </div>
          <p style="color: white;"><strong>27000 ₸</strong></p> <button class="btn-delete">Удалить</button>
        </div>
      </div>
      <p class="total">Итого: 39000 ₸</p>
      <button class="btn">Оформить заказ</button>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 RaufCake. Все права защищены.</p>
    </div>
  </footer>

</body>

</html>
