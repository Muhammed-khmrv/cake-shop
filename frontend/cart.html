<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Корзина</title>
  <link rel="stylesheet" href="../frontend/css/style.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-container">
      <div class="logo">
        <img src="images/logo.png" alt="logo">
        RaufMarket
      </div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="cart.html">Корзина</a>
        <a href="contacts.html">Контакты</a>
        <a href="./team.html">Наша команда</a>
      </nav>
      <div class="auth-buttons">
        <a class="login" href="login.html">Login</a>
        <a class="register" href="register.html">Register</a>
      </div>
    </div>
  </header>

  <div class="cart-container">

    <h1 class="cart-title">Корзина</h1>

    <table class="cart-table">
      <thead class="cart-head">
        <tr>
          <th class="cart-th">Фото</th>
          <th class="cart-th">Название</th>
          <th class="cart-th">Цена</th>
          <th class="cart-th">Кол-во</th>
          <th class="cart-th">Сумма</th>
          <th class="cart-th"></th>
        </tr>
      </thead>

      <tbody class="cart-body">

        <tr class="cart-row">

          <td class="cart-img">
            <a href="./product.html">
              <img src="../frontend/images/Chocolate-cake.jpg" alt="Шоколадный торт" class="cart-cake-image">
            </a>
          </td>

          <td class="cart-name">
            <a href="cake-chocolate.html" class="cart-product-link">
             Футболка
            </a>
          </td>

          <td class="cart-price">
            12000 ₸
          </td>

          <td class="cart-quantity">
            1
          </td>

          <td class="cart-total">
            12000 ₸
          </td>

          <td class="cart-remove">
            <a href="#" class="cart-remove-btn">
              Удалить
            </a>
          </td>

        </tr>

        <tr class="cart-row">

          <td class="cart-img">
            <a href="./product.html">
              <img src="../frontend/images/Strawberry-cake.jpg" alt="Клубничный торт" class="cart-cake-image">
            </a>
          </td>

          <td class="cart-name">
            <a href="cake-strawberry.html" class="cart-product-link">
              Джинсы Слим
            </a>
          </td>

          <td class="cart-price">
            13500 ₸
          </td>

          <td class="cart-quantity">
            2
          </td>

          <td class="cart-total">
            27000 ₸
          </td>

          <td class="cart-remove">
            <a href="#" class="cart-remove-btn">
              Удалить
            </a>
          </td>

        </tr>

      </tbody>
    </table>

    <p class="cart-total-price">
      <strong>Общая сумма:</strong> 39000 ₸
    </p>

    <a href="#" class="btn-order">
      Оформить заказ
    </a>

    <a href="catalog.html" class="btn-catalog">
      Перейти в каталог
    </a>

  </div>
  </div>
  <footer class="footer">
    <div class="container">
      <p>© 2026 RaufMarket. Все права защищены.</p>
    </div>
  </footer>

</body>

</html>
