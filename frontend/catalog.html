<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог | RaufMarket</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-container">
      <div class="logo">
        <img src="images/logo.png" alt="logo">
        RaufCake
      </div>

      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="cart.html">Корзина</a>
        <a href="contacts.html">Контакты</a>
        <a href="team.html">Наша команда</a>
      </nav>

      <div class="auth-buttons">
        <a class="login" href="login.html">Login</a>
        <a class="register" href="register.html">Register</a>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>
    <section class="catalog container">

      <h2>Каталог</h2>

      <!-- Категории -->
      <div class="catalog-categories">
        <a href="#" class="category-btn active">Все</a>
        <a href="#" class="category-btn">Джинсы</a>
        <a href="#" class="category-btn">Футболки</a>
        <a href="#" class="category-btn">Рубажки</a>
        <a href="#" class="category-btn">Детские</a>
        <a href="#" class="category-btn">Кофты</a>
      </div>

      <!-- Карточки тортов -->
      <div class="cakes">

        <div class="cake-card">
          <img src="images/Chocolate-cake.jpg" alt="Шоколадный торт">
          <h3>Шоколадный торт</h3>
          <p class="price">12000 ₸</p>
          <a href="product.html" class="btn">Подробнее</a>
        </div>

        <div class="cake-card">
          <img src="images/Strawberry-cake.jpg" alt="Клубничный торт">
          <h3>Клубничный торт</h3>
          <p class="price">13500 ₸</p>
          <a href="product.html" class="btn">Подробнее</a>
        </div>

        <div class="cake-card">
          <img src="images/Vanilla-cake.jpg" alt="Ванильный торт">
          <h3>Ванильный торт</h3>
          <p class="price">12500 ₸</p>
          <a href="product.html" class="btn">Подробнее</a>
        </div>

      </div>

    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 RaufMarket. Все права защищены.</p>
    </div>
  </footer>

</body>

</html>
